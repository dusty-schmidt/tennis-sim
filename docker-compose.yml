version: "3.8"
services:
  api:
    build: .
    ports:
      - "5000:5000"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

  ui:
    build: .
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "ui/app.py", "--server.address", "0.0.0.0"]
    env_file: .env
    volumes:
      - .:/app
